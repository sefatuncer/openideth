version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openideth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openideth-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openideth-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '4000:4000'
      - '9229:9229'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
    networks:
      - openideth-network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - openideth-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '3000:3000'
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - ./apps/web/src:/app/apps/web/src
    networks:
      - openideth-network

  hardhat:
    image: node:20-alpine
    working_dir: /app
    command: npx hardhat node
    ports:
      - '8545:8545'
    volumes:
      - ./packages/contracts:/app
    networks:
      - openideth-network

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    depends_on:
      - web
      - api
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - openideth-network

volumes:
  postgres_data:
  redis_data:

networks:
  openideth-network:
    driver: bridge
